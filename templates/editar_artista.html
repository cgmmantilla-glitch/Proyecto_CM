<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Artista</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        textarea :focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2563eb;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #334155;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Editar Artista</h1>
        
        <form action="/actualizar_artista/{{ artista[0] }}" method="POST">
            <div class="form-group">
                <label>Nombre Artístico</label>
                <input type="text" name="nombre_artistico" value="{{ artista[1] }}" required>
            </div>

            <div class="form-group">
                <label>Nombre Real</label>
                <input type="text" name="nombre_real" value="{{ artista[2] }}">
            </div>

            <div class="form-group">
                <label>País</label>
                <input type="text" name="pais" value="{{ artista[3] }}">
            </div>

            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <input type="text" name="fecha_nacimiento" value="{{ artista[4] }}">
            </div>

            <div class="form-group">
                <label>Género Musical</label>
                <input type="text" name="genero_musical" value="{{ artista[5] }}">
            </div>

            <div class="form-group">
                <label>Biografía</label>
                <textarea name="biografia">{{ artista[6] }}</textarea>
            </div>

            <button type="submit" class="btn-submit">Actualizar Cambios</button>
        </form>
        
        <a href="/" class="back-link">← Volver al inicio</a>
    </div>

</body>
</html>
